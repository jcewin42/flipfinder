services:
  flipfinder:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
      - ./logs:/app/logs
    # Jetson reachability: if the Jetson is elsewhere on your LAN (the
    # expected setup), no network config is needed here -- config.yaml's
    # inference.jetson.base_url just needs to be its LAN IP. network_mode:
    # host is only relevant if you ever run the Jetson service on the same
    # machine as this container.
